<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AxyProxy Switcher Options</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/options.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h1 class="logo">AxyProxy Switcher</h1>
      <nav id="nav">
        <div class="nav-section">Settings</div>
        <a href="#general" class="nav-item" data-page="general">⚙ General</a>

        <a href="#" class="nav-item nav-add" id="add-profile">➕ New profile…</a>
      </nav>
      <div id="actions">

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal"></div>
  </div>
  <script src="js/options/app.js" type="module"></script>

</html>
